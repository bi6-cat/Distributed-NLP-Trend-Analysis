---
- name: Cài đặt và cấu hình Hadoop HDFS
  hosts: all
  become: yes
  vars:
    hadoop_version: "3.3.6"
    hadoop_url: "https://dlcdn.apache.org/hadoop/common/hadoop-{{ hadoop_version }}/hadoop-{{ hadoop_version }}.tar.gz"
    install_dir: "/opt/hadoop"
    namenode_dir: "/data/hdfs/namenode"
    datanode_dir: "/data/hdfs/datanode"

  tasks:
    - name: Cài đặt dependencies
      apt:
        name: "{{ item }}"
        state: present
      with_items:
        - wget
        - rsync

    - name: Tải Apache Hadoop (nếu chưa có)
      get_url:
        url: "{{ hadoop_url }}"
        dest: "/tmp/hadoop-{{ hadoop_version }}.tar.gz"
      
    - name: Giải nén Hadoop archive
      unarchive:
        src: "/tmp/hadoop-{{ hadoop_version }}.tar.gz"
        dest: "/opt/"
        remote_src: yes
        creates: "/opt/hadoop-{{ hadoop_version }}"

    - name: Tạo symlink
      file:
        src: "/opt/hadoop-{{ hadoop_version }}"
        dest: "{{ install_dir }}"
        state: link

    - name: Cấp quyền sở hữu thư mục cho user chạy
      file:
        path: "/opt/hadoop-{{ hadoop_version }}"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        recurse: true

    - name: Định nghĩa thư mục NameNode (chỉ trên master)
      file:
        path: "{{ namenode_dir }}"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0755'
      when: inventory_hostname in groups['master']

    - name: Định nghĩa thư mục DataNode (trên workers)
      file:
        path: "{{ datanode_dir }}"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0755'
      when: inventory_hostname in groups['workers']

    - name: Cấu hình core-site.xml
      blockinfile:
        path: "{{ install_dir }}/etc/hadoop/core-site.xml"
        marker: "<!-- {mark} ANSIBLE MANAGED BLOCK CORE -->"
        insertafter: "<configuration>"
        block: |
          <property>
            <name>fs.defaultFS</name>
            <value>hdfs://{{ hostvars[groups['master'][0]]['ansible_host'] | default(groups['master'][0]) }}:9000</value>
          </property>

    - name: Cấu hình hdfs-site.xml
      blockinfile:
        path: "{{ install_dir }}/etc/hadoop/hdfs-site.xml"
        marker: "<!-- {mark} ANSIBLE MANAGED BLOCK HDFS -->"
        insertafter: "<configuration>"
        block: |
          <property>
            <name>dfs.replication</name>
            <value>{{ groups['workers'] | length }}</value>
          </property>
          <property>
            <name>dfs.namenode.name.dir</name>
            <value>file://{{ namenode_dir }}</value>
          </property>
          <property>
            <name>dfs.datanode.data.dir</name>
            <value>file://{{ datanode_dir }}</value>
          </property>

    - name: Cấu hình workers (DataNodes) trên Master
      copy:
        dest: "{{ install_dir }}/etc/hadoop/workers"
        content: |
          {% for host in groups['workers'] %}
          {{ hostvars[host]['ansible_host'] | default(host) }}
          {% endfor %}
      when: inventory_hostname in groups['master']

    - name: Format NameNode (Lần đầu duy nhất)
      become: yes
      become_user: "{{ ansible_user }}"
      shell: "echo 'Y' | {{ install_dir }}/bin/hdfs namenode -format -force"
      when: inventory_hostname in groups['master']
      ignore_errors: yes

    - name: Cập nhật biến môi trường HADOOP_HOME
      lineinfile:
        path: /etc/profile.d/hadoop.sh
        line: "export HADOOP_HOME={{ install_dir }}\nexport PATH=$PATH:$HADOOP_HOME/bin:$HADOOP_HOME/sbin"
        create: yes
