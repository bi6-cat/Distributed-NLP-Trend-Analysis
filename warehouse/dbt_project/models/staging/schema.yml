version: 2

models:
  - name: stg_posts
    description: >
      Staging view over dwh_prod.stg_posts. Adds derived time dimensions
      and body_length. Filters empty bodies and data older than 90 days.
    columns:
      - name: post_id
        description: Unique post identifier
        tests:
          - not_null
      - name: source
        description: "Data source: voz, tinhte, vnexpress, youtube"
        tests:
          - not_null
          - accepted_values:
              values: ['voz', 'tinhte', 'vnexpress', 'youtube']
      - name: author_id
        description: Author identifier
        tests:
          - not_null
      - name: sentiment_label
        description: "Sentiment classification: positive, negative, neutral"
        tests:
          - accepted_values:
              values: ['positive', 'negative', 'neutral', '']
      - name: created_at
        tests:
          - not_null

  - name: stg_sentiments
    description: >
      Pivoted sentiment view with one-hot columns (is_positive, is_negative,
      is_neutral) for easy SUM aggregation.
    columns:
      - name: post_id
        tests:
          - not_null
      - name: sentiment_label
        tests:
          - not_null

